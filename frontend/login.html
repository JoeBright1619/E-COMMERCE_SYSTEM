<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — CAGURA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/styles.css" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">CAGURA.com</a>
        <div id="auth-links" class="ms-auto"></div>
      </div>
    </nav>

    <main class="container my-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card shadow-sm">
            <div class="card-body">
              <h4 class="card-title">Login</h4>
              <form id="login-form" novalidate>
                <div class="mb-3">
                  <label for="login-username" class="form-label">Username</label>
                  <input id="login-username" name="username" class="form-control" placeholder="Enter your username" autocomplete="username">
                </div>
                <div class="mb-3">
                  <label for="login-password" class="form-label">Password</label>
                  <input id="login-password" name="password" type="password" class="form-control" placeholder="Enter your password" autocomplete="current-password">
                </div>
                <div class="mb-3 form-check">
                  <input type="checkbox" class="form-check-input" id="remember-me">
                  <label class="form-check-label" for="remember-me">Remember me</label>
                </div>
                <div class="d-flex gap-2">
                  <button type="submit" class="btn btn-primary">Login</button>
                  <a href="register.html" class="btn btn-link">Register</a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="bg-dark text-white py-4 mt-auto">
      <div class="container text-center small">&copy; 2026 CAGURA — Prototype</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
  </body>
</html>
