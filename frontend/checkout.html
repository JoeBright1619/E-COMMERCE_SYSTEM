<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Checkout — CAGURA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/styles.css" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">CAGURA.com</a>
        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
            <li class="nav-item"><a class="nav-link active" href="checkout.html">Checkout</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container my-5">
      <div class="row g-4">
        <div class="col-md-7">
          <h4>Billing & Shipping</h4>
          <form>
            <div class="mb-3">
              <label class="form-label">Full name</label>
              <input class="form-control" placeholder="Jane Doe">
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" placeholder="you@example.com">
            </div>
            <div class="mb-3">
              <label class="form-label">Address</label>
              <input class="form-control" placeholder="123 Main St">
            </div>
            <div class="mb-3">
              <label class="form-label">City</label>
              <input class="form-control" placeholder="City">
            </div>
            <div class="mb-3">
              <label class="form-label">Card (demo)</label>
              <input class="form-control" placeholder="Card number">
            </div>
            <button id="place-order" class="btn btn-success">Place order</button>
          </form>
        </div>
        <div class="col-md-5">
          <h4>Order summary</h4>
          <ul id="checkout-list" class="list-group mb-3">
            <!-- items inserted by JS -->
          </ul>
          <div class="d-flex justify-content-between align-items-center fw-bold">
            <div>Total</div>
            <div id="checkout-total">$0.00</div>
          </div>
        </div>
      </div>
    </main>

    <footer class="bg-dark text-white py-4 mt-auto">
      <div class="container text-center small">&copy; 2026 CAGURA — Prototype</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
  </body>
</html>
