<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Product — CAGURA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/styles.css" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">CAGURA.com</a>
        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
            <li class="nav-item"><a class="nav-link" href="checkout.html">Checkout</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container my-5">
      <div class="row g-4">
        <div class="col-md-6">
          <img id="p-img" src="https://picsum.photos/seed/p1/900/600" alt="Product" class="product-image rounded shadow-sm">
        </div>
        <div class="col-md-6">
          <h2 id="p-title">Product Title</h2>
          <p id="p-desc" class="text-muted">Product short description.</p>
          <div class="mb-3">
            <span id="p-price" class="fs-3 text-primary">$0.00</span>
          </div>
          <div class="d-flex align-items-center gap-2">
            <input id="qty" type="number" min="1" value="1" class="form-control" style="width:110px">
            <button id="add-to-cart" class="btn btn-primary">Add to cart</button>
            <a href="cart.html" class="btn btn-outline-secondary">View Cart</a>
          </div>
          <hr class="my-4">
          <h6>Details</h6>
          <p class="text-muted">This is a demo product page. No backend — interactions are stored in your browser localStorage.</p>
        </div>
      </div>
    </main>

    <footer class="bg-dark text-white py-4 mt-auto">
      <div class="container text-center small">&copy; 2026 CAGURA — Prototype</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
  </body>
</html>
