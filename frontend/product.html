<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Product — CAGURA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/styles.css" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">CAGURA.com</a>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
                <li class="nav-item"><a class="nav-link" href="checkout.html">Checkout</a></li>
            </ul>
            <div class="d-flex align-items-center ms-3">
                <a href="profile.html" class="nav-link text-light p-0 me-2" title="Profile">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
                        <path d="M13.468 12.37C12.758 11.226 11.59 10.5 10 10.5H6c-1.59 0-2.758.726-3.468 1.87A6.987 6.987 0 0 0 8 15a6.987 6.987 0 0 0 5.468-2.63z" />
                        <path fill-rule="evenodd" d="M8 9a3 3 0 1 0 0-6 3 3 0 0 0 0 6z" />
                        <path fill-rule="evenodd" d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1z" />
                    </svg>
                </a>
                <div id="auth-links"></div>
            </div>
        </div>
      </div>
    </nav>

    <main class="container my-5">
      <div class="row g-4">
        <div class="col-md-6">
          <img id="p-img" src="https://picsum.photos/seed/p1/900/600" alt="Product" class="product-image rounded shadow-sm">
        </div>
        <div class="col-md-6">
          <h2 id="p-title">Product Title</h2>
          <p id="p-desc" class="text-muted">Product short description.</p>
          <div class="mb-3">
            <span id="p-price" class="fs-3 text-primary">$0.00</span>
          </div>
          <div class="d-flex align-items-center gap-2">
            <input id="qty" type="number" min="1" value="1" class="form-control" style="width:110px">
            <button id="add-to-cart" class="btn btn-primary">Add to cart</button>
            <a href="cart.html" class="btn btn-outline-secondary">View Cart</a>
          </div>
          <hr class="my-4">
          <h6>Details</h6>
          <p class="text-muted">This is a demo product page. No backend — interactions are stored in your browser localStorage.</p>
        </div>
      </div>
    </main>

    <footer class="bg-dark text-white py-4 mt-auto">
      <div class="container text-center small">&copy; 2026 CAGURA — Prototype</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
  </body>
</html>
