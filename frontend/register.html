<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register — CAGURA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/styles.css" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">CAGURA.com</a>
        <div id="auth-links" class="ms-auto"></div>
      </div>
    </nav>

    <main class="container my-5">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <div class="card shadow-sm">
            <div class="card-body">
              <h4 class="card-title">Create an account</h4>
              <form id="register-form" novalidate>
                <div class="row g-3">
                  <div class="col-md-6">
                    <label for="reg-first" class="form-label">First name</label>
                    <input id="reg-first" name="firstName" class="form-control" placeholder="First name" autocomplete="given-name">
                  </div>
                  <div class="col-md-6">
                    <label for="reg-last" class="form-label">Last name</label>
                    <input id="reg-last" name="lastName" class="form-control" placeholder="Last name" autocomplete="family-name">
                  </div>
                </div>
                <div class="mb-3 mt-3">
                  <label for="reg-email" class="form-label">Email</label>
                  <input id="reg-email" name="email" type="email" class="form-control" placeholder="you@example.com" autocomplete="email">
                </div>
                <div class="row g-3">
                  <div class="col-md-6">
                    <label for="reg-pass" class="form-label">Password</label>
                    <input id="reg-pass" name="password" type="password" class="form-control" placeholder="Create a password" autocomplete="new-password">
                  </div>
                  <div class="col-md-6">
                    <label for="reg-pass2" class="form-label">Confirm password</label>
                    <input id="reg-pass2" name="password2" type="password" class="form-control" placeholder="Retype password" autocomplete="new-password">
                  </div>
                </div>
                <div class="mb-3 mt-3 form-check">
                  <input type="checkbox" class="form-check-input" id="terms">
                  <label class="form-check-label" for="terms">I agree to the <a href="#">terms and privacy policy</a></label>
                </div>
                <div class="d-flex gap-2">
                  <button type="submit" class="btn btn-primary">Register</button>
                  <a href="login.html" class="btn btn-link">Already have an account? Login</a>
                </div>
                <p class="mt-3 text-muted small">Prototype registration — no backend. Registration stores nothing persistent.</p>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="bg-dark text-white py-4 mt-auto">
      <div class="container text-center small">&copy; 2026 CAGURA — Prototype</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
  </body>
</html>
