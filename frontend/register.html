<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register — CAGURA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/styles.css" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">CAGURA</a>
      </div>
    </nav>

    <main class="container my-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card shadow-sm">
            <div class="card-body">
              <h4 class="card-title">Register</h4>
              <form id="register-form">
                <div class="mb-3">
                  <label class="form-label">Name</label>
                  <input id="reg-name" class="form-control" placeholder="Jane Doe">
                </div>
                <div class="mb-3">
                  <label class="form-label">Email</label>
                  <input id="reg-email" type="email" class="form-control" placeholder="you@example.com">
                </div>
                <div class="mb-3">
                  <label class="form-label">Password</label>
                  <input id="reg-pass" type="password" class="form-control" placeholder="password">
                </div>
                <button type="submit" class="btn btn-primary">Register</button>
                <a href="login.html" class="btn btn-link">Login</a>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="bg-dark text-white py-4 mt-auto">
      <div class="container text-center small">&copy; 2026 CAGURA — Prototype</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
  </body>
</html>
